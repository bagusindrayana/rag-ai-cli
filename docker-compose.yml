version: "3.8"
services:
  contextapi:
    build: .
    container_name: contextapi
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./.env.prod
    volumes:
      - ./faiss_db:/app/faiss_db
      - ./faiss_db_mistral:/app/faiss_db_mistral
      - ./logs:/var/log/contextapi
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
